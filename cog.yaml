visibility: "private"

build:
  gpu: true
  cuda: "12.4"
  system_packages:
    - curl
  python_version: "3.12"
  python_requirements: requirements.txt
  run:
    # Self-contained executable (bundles ERTS/BEAM via Burrito — see the
    # release `steps`/`burrito` config in mix.exs) built and published from
    # this repo. No Elixir/Erlang/build toolchain needed in this image;
    # rebuild and re-upload the release asset after any lib/ or mix.exs
    # change (`mix release`, then `gh release upload`).
    - curl -fsSL -o /opt/see_through_compositor https://github.com/weftspun/see-through-layer-compositor-cog/releases/download/v0.1.0/see_through_compositor_linux_x86_64
    - chmod +x /opt/see_through_compositor
    # EXLA's precompiled CUDA XLA extension needs two runtime libs the cog
    # cuda12.4 base image doesn't ship: NVSHMEM and NVRTC builtins, both
    # pinned to specific versions by deps/xla's HERMETIC_*_VERSION for the
    # cuda12 target (see deps/xla/lib/xla.ex) — newer than this image's
    # CUDA 12.4 toolkit. Both ship as PyPI NVIDIA wheels.
    - pip install --no-deps --target /opt/cuda-extra-libs nvidia-nvshmem-cu12==3.3.9 nvidia-cuda-nvrtc-cu12==12.9.86
    - echo /opt/cuda-extra-libs/nvidia/nvshmem/lib > /etc/ld.so.conf.d/exla-extra.conf
    - echo /opt/cuda-extra-libs/nvidia/cuda_nvrtc/lib >> /etc/ld.so.conf.d/exla-extra.conf
    - ldconfig

run: "run.py:Runner"
